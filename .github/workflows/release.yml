name: Build And Release Windows Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install all dependencies
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\install_all.ps1

      - name: Build UI
        shell: pwsh
        run: |
          Set-Location .\ui
          npm run build

      - name: Set app version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Set-Content -Path .\app_version.py -Value "APP_VERSION = \"$version\""
          Get-Content .\app_version.py

      - name: Build EXE
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m pip install pyinstaller
          .\.venv\Scripts\python.exe -m PyInstaller WootingRGB.spec --clean -y

      - name: Archive release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\release -Force | Out-Null

          $exe = Get-ChildItem .\dist -Recurse -Filter WootingRGB.exe | Select-Object -First 1
          if (-not $exe) {
            throw "WootingRGB.exe nao encontrado em dist/."
          }

          Copy-Item $exe.FullName .\release\WootingRGB.exe -Force
          Compress-Archive -Path .\release\WootingRGB.exe -DestinationPath .\release\WootingRGB-${{ github.ref_name }}.zip -Force

          Get-ChildItem .\release | Format-Table -AutoSize

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
