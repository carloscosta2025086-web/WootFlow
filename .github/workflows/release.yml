name: Build And Release Windows Binary

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install all dependencies
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\install_all.ps1

      - name: Build UI
        shell: pwsh
        run: |
          Set-Location .\ui
          npm run build

      - name: Set app version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Set-Content -Path .\app_version.py -Value ('APP_VERSION = "{0}"' -f $version)
          Get-Content .\app_version.py

      - name: Build EXE
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m pip install pyinstaller
          .\.venv\Scripts\python.exe -m PyInstaller WootFlow.spec --clean -y

      - name: Download installer prerequisites
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\download_installer_prereqs.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          powershell -ExecutionPolicy Bypass -File .\scripts\build_installer.ps1 -Version $version -SkipUiBuild -SkipExeBuild

      - name: Archive release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\release -Force | Out-Null

          $appDir = Join-Path $PWD "dist\WootFlow"
          $exe = Get-Item (Join-Path $appDir "WootFlow.exe") -ErrorAction SilentlyContinue
          if (-not $exe) {
            throw "WootFlow.exe nao encontrado em dist\\WootFlow."
          }

          Compress-Archive -Path (Join-Path $appDir '*') -DestinationPath .\release\WootFlow-portable-${{ github.ref_name }}.zip -Force

          $installer = Get-ChildItem .\installer\output -Filter *.exe | Select-Object -First 1
          if (-not $installer) {
            throw "Instalador .exe nao encontrado em installer/output/."
          }

          Copy-Item $installer.FullName .\release\$($installer.Name) -Force

          Get-ChildItem .\release | Format-Table -AutoSize

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
